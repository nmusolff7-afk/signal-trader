<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX SIGNAL TRADER - LIVE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0e12;
      --bg2: #0f141a;
      --bg3: #151d27;
      --border: #1e2d3d;
      --accent: #00d4ff;
      --green: #00ff88;
      --red: #ff3355;
      --orange: #ff6b35;
      --yellow: #ffd700;
      --dim: #3a5068;
      --text: #e8f4f8;
      --text-dim: #6a8a9a;
      --mono: 'Courier New', monospace;
      --sans: 'Segoe UI', Tahoma, Geneva, sans-serif;
    }
    
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      height: 100%;
      overflow: hidden;
    }
    
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--accent);
      font-family: var(--sans);
    }
    
    .logo span { color: var(--orange); }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }
    
    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      height: calc(100vh - 57px);
      background: var(--border);
      overflow: hidden;
    }
    
    .panel {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }
    
    .panel-header {
      background: var(--bg2);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 4px;
    }
    
    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: var(--accent);
      font-family: var(--sans);
    }
    
    .stat-value.green { color: var(--green); }
    .stat-value.orange { color: var(--orange); }
    .stat-value.red { color: var(--red); }
    
    .source-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 8px 12px;
      margin-bottom: 6px;
      border-radius: 3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .source-name {
      flex: 1;
      color: var(--text);
      font-size: 12px;
    }
    
    .source-count {
      color: var(--accent);
      font-weight: bold;
      margin-right: 12px;
    }
    
    .source-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }
    
    .source-status.waiting { background: var(--dim); }
    .source-status.error { background: var(--red); }
    
    .event-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .event-item {
      background: var(--bg2);
      border-left: 3px solid var(--border);
      padding: 8px 12px;
      border-radius: 2px;
      font-size: 11px;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .event-item.classified {
      border-left-color: var(--accent);
      background: rgba(0, 212, 255, 0.05);
    }
    
    .event-item.tradeable {
      border-left-color: var(--green);
      background: rgba(0, 255, 136, 0.05);
    }
    
    .event-time {
      color: var(--text-dim);
      font-size: 10px;
      margin-bottom: 2px;
    }
    
    .event-source {
      color: var(--orange);
      font-weight: bold;
      margin-right: 8px;
    }
    
    .event-id {
      color: var(--yellow);
      font-weight: bold;
      margin-right: 8px;
    }
    
    .event-conf {
      color: var(--text-dim);
      float: right;
    }
    
    .event-text {
      color: var(--text-dim);
      font-size: 10px;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    ::-webkit-scrollbar {
      width: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--dim);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">APEX <span>SIGNAL</span> TRADER</div>
  <div class="status-indicator">
    <div class="pulse"></div>
    <span>PHASE 2 - WEEK 1 - LIVE</span>
  </div>
</header>

<div class="container">
  <!-- LEFT PANEL: Stats & Sources -->
  <div class="panel">
    <div class="panel-header">SYSTEM STATUS</div>
    <div class="panel-body">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Total Events</div>
          <div class="stat-value" id="total-events">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Classified</div>
          <div class="stat-value green" id="classified-events">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Tradeable</div>
          <div class="stat-value orange" id="tradeable-events">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Trades Logged</div>
          <div class="stat-value" id="trade-count">0</div>
        </div>
      </div>
      
      <div class="panel-header" style="margin-top: 16px; margin-left: -12px; margin-right: -12px; width: auto; margin-bottom: 8px;">SOURCE HEALTH</div>
      <div id="sources-list"></div>
    </div>
  </div>
  
  <!-- RIGHT PANEL: Live Events -->
  <div class="panel">
    <div class="panel-header">LIVE EVENT FEED</div>
    <div class="panel-body">
      <div class="event-list" id="events-list"></div>
    </div>
  </div>
</div>

<script>
  const API_BASE = '/api';
  
  async function updateStatus() {
    try {
      const resp = await fetch(`${API_BASE}/status`);
      const data = await resp.json();
      
      // Update stats
      document.getElementById('total-events').textContent = data.event_count || 0;
      document.getElementById('classified-events').textContent = (data.event_count - (data.unclassified_count || 0)) || 0;
      document.getElementById('tradeable-events').textContent = data.tradeable_count || 0;
      document.getElementById('trade-count').textContent = data.trade_count || 0;
      
      // Update sources
      const sourcesList = document.getElementById('sources-list');
      if (data.source_health && data.source_health.length > 0) {
        sourcesList.innerHTML = data.source_health.map(s => `
          <div class="source-item">
            <div class="source-name">${s.source}</div>
            <div class="source-count">${s.total || 0}</div>
            <div class="source-status ${s.status === 'live' ? 'live' : 'waiting'}"></div>
          </div>
        `).join('');
      } else {
        sourcesList.innerHTML = '<div style="color: var(--text-dim); padding: 8px; text-align: center;">No sources active</div>';
      }
    } catch (e) {
      console.error('Status fetch failed:', e);
    }
  }
  
  async function updateEvents() {
    try {
      const resp = await fetch(`${API_BASE}/events?limit=50`);
      const data = await resp.json();
      
      const eventsList = document.getElementById('events-list');
      if (!data.events || data.events.length === 0) {
        eventsList.innerHTML = '<div style="color: var(--text-dim); padding: 16px; text-align: center;">Waiting for events...</div>';
        return;
      }
      
      eventsList.innerHTML = data.events.map(e => {
        const time = new Date(e.ts).toLocaleTimeString();
        const classified = e.event_id && e.event_id !== 'NO_EVENT';
        const tradeable = e.tradeable;
        const className = tradeable ? 'tradeable' : (classified ? 'classified' : '');
        
        return `
          <div class="event-item ${className}">
            <div class="event-time">${time}</div>
            <div>
              <span class="event-source">${e.source}</span>
              ${classified ? `<span class="event-id">${e.event_id}</span><span class="event-conf">${(e.confidence || 0).toFixed(2)}</span>` : ''}
            </div>
            <div class="event-text">${e.raw_text.substring(0, 100)}...</div>
          </div>
        `;
      }).join('');
    } catch (e) {
      console.error('Events fetch failed:', e);
    }
  }
  
  // Update every 1 second
  setInterval(updateStatus, 1000);
  setInterval(updateEvents, 1000);
  
  // Initial load
  updateStatus();
  updateEvents();
</script>

</body>
</html>
