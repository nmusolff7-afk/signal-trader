<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX SIGNAL TRADER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e12;
      --bg2: #0f141a;
      --bg3: #151d27;
      --border: #1e2d3d;
      --accent: #00d4ff;
      --green: #00ff88;
      --red: #ff3355;
      --orange: #ff6b35;
      --yellow: #ffd700;
      --dim: #3a5068;
      --text: #e8f4f8;
      --text-dim: #6a8a9a;
      --mono: 'Courier New', monospace;
      --sans: 'Segoe UI', Tahoma, Geneva, sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      height: 100%;
      overflow: hidden;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--accent);
      font-family: var(--sans);
    }
    .logo span { color: var(--orange); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 11px;
    }

    .price-ticker {
      display: flex;
      gap: 16px;
    }

    .price-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .price-symbol { color: var(--text-dim); font-size: 10px; }
    .price-value { color: var(--text); font-weight: bold; font-size: 13px; font-family: var(--sans); }
    .price-value.up { color: var(--green); }
    .price-value.down { color: var(--red); }

    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1px;
      height: calc(100vh - 49px);
      background: var(--border);
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .panel-header {
      background: var(--bg2);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .stat-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .stat-card {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 8px;
      border-radius: 3px;
      text-align: center;
    }

    .stat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
    .stat-value { font-size: 18px; font-weight: bold; color: var(--accent); font-family: var(--sans); margin-top: 2px; }
    .stat-value.green { color: var(--green); }
    .stat-value.orange { color: var(--orange); }

    .source-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }
    .source-item.inactive { opacity: 0.4; }

    .source-name { flex: 1; color: var(--text); }
    .source-count { color: var(--accent); font-weight: bold; margin-right: 8px; font-size: 10px; }
    .source-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
    }
    .source-dot.waiting { background: var(--dim); }

    .event-item {
      background: var(--bg2);
      border-left: 3px solid var(--border);
      padding: 6px 10px;
      margin-bottom: 3px;
      border-radius: 2px;
      font-size: 11px;
    }
    .event-item.classified { border-left-color: var(--accent); background: rgba(0,212,255,0.04); }
    .event-item.tradeable { border-left-color: var(--green); background: rgba(0,255,136,0.04); }
    .event-item.price { border-left-color: var(--yellow); background: rgba(255,215,0,0.03); }
    .event-item.new { animation: fadeIn 0.4s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .event-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }
    .event-time { color: var(--text-dim); font-size: 9px; }
    .event-source { color: var(--orange); font-weight: bold; font-size: 10px; }
    .event-id { color: var(--yellow); font-weight: bold; font-size: 10px; }
    .event-conf { color: var(--text-dim); font-size: 9px; margin-left: auto; }
    .event-text { color: var(--text-dim); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">APEX <span>SIGNAL</span> TRADER</div>
  <div class="header-right">
    <div class="price-ticker" id="price-ticker"></div>
    <div style="display:flex; align-items:center; gap:6px;">
      <div class="pulse"></div>
      <span id="conn-label" style="color: var(--text-dim);">LIVE</span>
    </div>
  </div>
</header>

<div class="container">
  <!-- LEFT: Sources -->
  <div class="panel">
    <div class="panel-header">
      <span>SOURCES</span>
      <span id="source-count" style="color: var(--accent);">0 / 0</span>
    </div>
    <div class="panel-body">
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-label">EVENTS</div>
          <div class="stat-value" id="total-events">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">CLASSIFIED</div>
          <div class="stat-value green" id="classified-events">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">TRADEABLE</div>
          <div class="stat-value orange" id="tradeable-events">0</div>
        </div>
      </div>
      <div id="sources-list"></div>
    </div>
  </div>

  <!-- RIGHT: Event feed -->
  <div class="panel">
    <div class="panel-header">
      <span>LIVE FEED</span>
      <span id="feed-count" style="color: var(--text-dim);">0 events</span>
    </div>
    <div class="panel-body">
      <div id="events-list"></div>
    </div>
  </div>
</div>

<script>
  const API = '/api';
  let lastEventHash = '';
  let lastStatusHash = '';
  let knownEventIds = new Set();

  async function updateStatus() {
    try {
      const resp = await fetch(`${API}/status`);
      const data = await resp.json();
      const hash = JSON.stringify([data.event_count, data.tradeable_count, data.source_health?.length]);
      if (hash === lastStatusHash) return;
      lastStatusHash = hash;

      document.getElementById('total-events').textContent = data.event_count || 0;
      const classified = (data.event_count || 0) - (data.unclassified_count || 0);
      document.getElementById('classified-events').textContent = classified;
      document.getElementById('tradeable-events').textContent = data.tradeable_count || 0;

      const health = data.source_health || [];
      const activeCount = health.filter(s => s.total > 0).length;
      document.getElementById('source-count').textContent = `${activeCount} / ${health.length}`;

      // Sort: active first, then alphabetical
      health.sort((a, b) => {
        if (a.total > 0 && b.total === 0) return -1;
        if (a.total === 0 && b.total > 0) return 1;
        return a.source.localeCompare(b.source);
      });

      document.getElementById('sources-list').innerHTML = health.map(s => {
        const active = s.total > 0;
        return `<div class="source-item ${active ? '' : 'inactive'}">
          <div class="source-name">${s.source}</div>
          <div class="source-count">${s.total}</div>
          <div class="source-dot ${active ? '' : 'waiting'}"></div>
        </div>`;
      }).join('');
    } catch (e) {
      console.error('Status error:', e);
    }
  }

  async function updateEvents() {
    try {
      const resp = await fetch(`${API}/events?limit=80`);
      const data = await resp.json();
      if (!data.events || data.events.length === 0) return;

      // Check if data changed
      const hash = data.events[0]?.id + '-' + data.events.length;
      if (hash === lastEventHash) return;
      lastEventHash = hash;

      document.getElementById('feed-count').textContent = `${data.events.length} events`;

      const list = document.getElementById('events-list');
      list.innerHTML = data.events.map(e => {
        const time = new Date(e.ts).toLocaleTimeString();
        const hasEvent = e.event_id && e.event_id !== 'NO_EVENT';
        const tradeable = e.tradeable;
        const isPrice = (e.source || '').includes('Price');
        const isNew = !knownEventIds.has(e.id);
        if (isNew) knownEventIds.add(e.id);

        let cls = '';
        if (tradeable) cls = 'tradeable';
        else if (hasEvent) cls = 'classified';
        else if (isPrice) cls = 'price';
        if (isNew) cls += ' new';

        const text = (e.raw_text || '').substring(0, 140);

        return `<div class="event-item ${cls}">
          <div class="event-meta">
            <span class="event-time">${time}</span>
            <span class="event-source">${e.source}</span>
            ${hasEvent ? `<span class="event-id">${e.event_id}</span>` : ''}
            ${hasEvent ? `<span class="event-conf">${(e.confidence || 0).toFixed(2)}</span>` : ''}
          </div>
          <div class="event-text">${text}</div>
        </div>`;
      }).join('');
    } catch (e) {
      console.error('Events error:', e);
    }
  }

  // Price ticker via /api/events — look for price sources
  function updatePriceTicker(events) {
    // Handled by the price source emitting into the same feed
    // The header ticker is updated from the latest price events
  }

  // Poll intervals — no flashing
  setInterval(updateStatus, 5000);   // 5 seconds
  setInterval(updateEvents, 3000);   // 3 seconds

  // Initial load
  updateStatus();
  updateEvents();
</script>

</body>
</html>
